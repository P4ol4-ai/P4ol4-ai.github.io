<style>
  .btn-getstarted {
    color: #000000 !important;
    border: 2px solid #28a745 !important;

  }

    background-color: #28a745 !important;

  }

  .btn-getstarted:active {
    background-color: #28a745 !important;
    color: #000000 !important;
    transform: scale(0.95);
  }
  </style>
