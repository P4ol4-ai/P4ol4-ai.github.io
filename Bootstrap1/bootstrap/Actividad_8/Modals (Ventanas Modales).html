<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Actividad 8 Modals</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: white; /* 👈 CAMBIADO */
      color: black; /* 👈 para que el texto se vea */
      padding: 20px;
    }
    h2 {
      color: orange;
      font-weight: bold;
    }
    .contenedor {
      background-color: #dcdcdc;
      padding: 20px;
      border-radius: 5px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
   <h1 class="text-center">Actividad 8 </h1>
  <p class="text-center text-muted mb-5">Modals (Ventanas Modales)</p>

  <div class="contenedor">

    <!-- Botones -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal1">
      Open modal for write
    </button>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal1">
      Open modal for write
    </button>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal1">
      Open modal for write
    </button>

  </div>

  <!-- MODAL -->
  <div class="modal fade" id="modal1" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <!-- Header -->
        <div class="modal-header">
          <h5 class="modal-title">New message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- Body -->
        <div class="modal-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Subject:</label>
              <input type="text" class="form-control" placeholder="Enter subject">
            </div>

            <div class="mb-3">
              <label class="form-label">Message:</label>
              <textarea class="form-control" rows="3" placeholder="Write your message"></textarea>
            </div>
          </form>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">
            Close
          </button>
          <button class="btn btn-primary">
            Send message
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- JS Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
