<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Actividad 5 - Formularios</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }
    h1 {
      margin-top: 30px;
    }
  </style>
</head>
<body>

<div class="container mt-4">
  <h1 class="text-center">Actividad 5</h1>
  <p class="text-center text-muted mb-4">Formularios</p>

  <form class="row g-3 needs-validation" novalidate>

    <!-- Nombre -->
    <div class="col-md-4">
      <label class="form-label">First name</label>
      <input type="text" class="form-control is-valid" value="Marco" required>
      <div class="valid-feedback">¡Bien!</div>
    </div>

    <!-- Apellido -->
    <div class="col-md-4">
      <label class="form-label">Last name</label>
      <input type="text" class="form-control is-valid" value="Escalera" required>
      <div class="valid-feedback">¡Bien!</div>
    </div>

    <!-- Username -->
    <div class="col-md-4">
      <label class="form-label">Username</label>
      <div class="input-group has-validation">
        <span class="input-group-text">@</span>
        <input type="text" class="form-control is-invalid" required>
        <div class="invalid-feedback">
          Por favor elija un nombre de usuario.
        </div>
      </div>
    </div>

    <!-- Dirección -->
    <div class="col-md-6">
      <label class="form-label">Dirección</label>
      <input type="text" class="form-control is-invalid" required>
      <div class="invalid-feedback">
        Por favor, proporcione una dirección válida.
      </div>
    </div>

    <!-- Departamento -->
    <div class="col-md-3">
      <label class="form-label">Departamento</label>
      <select class="form-select is-invalid" required>
        <option selected disabled value="">Seleccione...</option>
        <option>Oruro</option>
        <option>La Paz</option>
        <option>Cochabamba</option>
      </select>
      <div class="invalid-feedback">
        Por favor, seleccione un departamento.
      </div>
    </div>

    <!-- Teléfono -->
    <div class="col-md-3">
      <label class="form-label">Teléfono</label>
      <input type="text" class="form-control is-invalid" required>
      <div class="invalid-feedback">
        Por favor ingrese un teléfono válido.
      </div>
    </div>

    <!-- Checkbox -->
    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input is-invalid" type="checkbox" required>
        <label class="form-check-label">
          Acepte los términos y condiciones
        </label>
        <div class="invalid-feedback">
          Debes aceptar antes de enviar
        </div>
      </div>
    </div>

    <!-- Botón -->
    <div class="col-12">
      <button class="btn btn-primary" type="submit">
        Enviar Formulario
      </button>
    </div>

  </form>
</div>

<!-- JS Bootstrap (para validación) -->
<script>
(() => {
  'use strict';
  const forms = document.querySelectorAll('.needs-validation');

  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      }
      form.classList.add('was-validated');
    }, false);
  });
})();
</script>

</body>
</html>
