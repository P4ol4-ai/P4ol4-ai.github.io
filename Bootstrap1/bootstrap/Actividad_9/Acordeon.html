<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Actividad 9 - Accordion</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: white; /* 👈 fondo blanco */
      color: black;
    }

    .header {
      background: linear-gradient(to right, #1f2a33, #2c3e50);
      color: white;
      padding: 40px 0;
      text-align: center;
    }

    .accordion {
      margin: 30px;
    }
  </style>
</head>
<body>
 <h1 class="text-center">Actividad 9 </h1>
  <p class="text-center text-muted mb-5">Acordeon</p>

  <!-- Accordion -->
  <div class="accordion" id="accordionExample">

    <!-- Item 1 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
          Accordion item #1
        </button>
      </h2>
      <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
        <div class="accordion-body">
          Este es el contenido del primer acordeón.
        </div>
      </div>
    </div>

    <!-- Item 2 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo">
          Accordion item #2
        </button>
      </h2>
      <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
        <div class="accordion-body">
          Este es el contenido del segundo acordeón.
        </div>
      </div>
    </div>

    <!-- Item 3 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed bg-primary text-white" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree">
          Accordion item #3
        </button>
      </h2>
      <div id="collapseThree" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
        <div class="accordion-body">
          Placeholder content for this accordion, which is intended to demonstrate the 
          <strong>accordion-flush</strong> class. This is the third item's accordion body.
        </div>
      </div>
    </div>

  </div>

  <!-- JS Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
